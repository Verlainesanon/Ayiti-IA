name: CI — Ayiti-AI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1 : Lint & Format ─────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Format (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff — Check
        run: ruff check src/ tests/ scripts/ --output-format=github

      - name: Ruff — Format check
        run: ruff format --check src/ tests/ scripts/

  # ── Job 2 : Tests ────────────────────────────────────────────────────────
  test:
    name: "🧪 Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install package + dev deps
        run: |
          pip install -e ".[dev]"
          pip install peft transformers torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run Pytest with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=ayiti_ai \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          flags: unittests
          name: ayiti-ai-coverage
          fail_ci_if_error: false

  # ── Job 3 : Type Check (optionnel, non-bloquant) ─────────────────────────
  typecheck:
    name: "🔬 Type Check (Mypy)"
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true  # non-bloquant tant que le codebase est en cours d'annotation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps + mypy
        run: |
          pip install -e ".[dev]"
          pip install peft transformers torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run Mypy
        run: mypy src/ayiti_ai/ --ignore-missing-imports

  # ── Job 4 : Security Scan ───────────────────────────────────────────────
  security:
    name: "🔒 Security Scan (Bandit)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -r src/ayiti_ai/ -ll -x tests/
