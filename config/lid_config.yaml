version: "1.0.0"

pipeline:
  min_text_length: 2
  max_text_length: 5000
  enable_cache: true
  cache_size: 1000
  cache_ttl_seconds: 3600
  enabled_levels: [1, 2, 3]

preprocessing:
  unicode_normalization: "NFC"
  strip_urls: true
  strip_emojis: true
  lowercase_for_matching: true
  keep_original: true

level_1_rules:
  enabled: true
  markers_config: "config/lid_markers.yaml"
  min_markers_for_match: 1
  weighted_scoring: true
  ngram_bonus: 0.5

level_2_fasttext:
  enabled: true
  model_path: "models/lid.176.ftz"
  top_k: 3
  min_confidence: 0.80
  languages_of_interest: ["ht", "fr", "en"]
  fallback_language: null

level_3_charcnn:
  enabled: true
  model_path: "models/char_lid.pth"
  vocab_path: "models/char_vocab.json"
  min_confidence: 0.60
  max_seq_len: 128
  device: "cpu"
  batch_inference: false

postprocessing:
  code_switch_threshold: 0.30
  calibration:
    level_1: 1.0
    level_2: 0.95
    level_3: 0.85

monitoring:
  enable_prometheus: true
  enable_structured_logs: true
  log_predictions_sample_rate: 0.1
